<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ANON·PDF — Biblioteca</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   TOKENS — branco · traços vermelhos
   ============================================================ */
:root{
  --display:'Space Grotesk',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --body:'Inter',sans-serif;
  --dur:180ms;
  --ease:cubic-bezier(.4,0,.2,1);
}
html[data-theme="light"]{
  --bg:#ffffff;
  --bg-soft:#fafaf9;
  --ink:#0b0b0c;
  --dim:#8a8a8e;
  --faint:#c2c2c6;
  --line:#e9e7e4;
  --red:#e8231a;
  --red-soft:#e8231a14;
  --canvas-bg:#f2f1ef;
}
html[data-theme="dark"]{
  --bg:#0a0a0b;
  --bg-soft:#111112;
  --ink:#f2f2f0;
  --dim:#8a8a8e;
  --faint:#3a3a3e;
  --line:#1e1e21;
  --red:#ff2b21;
  --red-soft:#ff2b2118;
  --canvas-bg:#141416;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--body);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  transition:background var(--dur) var(--ease),color var(--dur) var(--ease);
}
::selection{background:var(--red-soft);color:var(--red);}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;}
input{font-family:inherit;}
svg{display:block;}
:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
}

/* ============================================================
   ASSINATURA — o anel vermelho
   ============================================================ */
.ring{border-radius:50%;border:2px solid var(--red);}
.spinner{
  width:34px;height:34px;border-radius:50%;
  border:2px solid transparent;border-top-color:var(--red);border-right-color:var(--red);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* rótulo com traço */
.trace-label{
  display:flex;align-items:center;gap:12px;
  font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--dim);
}
.trace-label::after{content:'';flex:1;height:1px;background:var(--red);opacity:.55;}

/* ============================================================
   AUTH
   ============================================================ */
#auth-screen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:100;padding:24px;
}
#auth-screen.hidden{display:none;}
.auth-box{width:100%;max-width:360px;position:relative;}
.auth-ring{
  position:absolute;top:-118px;left:50%;transform:translateX(-50%);
  width:190px;height:190px;pointer-events:none;opacity:.9;
}
.auth-brand{
  font-family:var(--display);font-weight:700;font-size:22px;
  letter-spacing:.42em;text-transform:uppercase;text-align:center;
  margin-bottom:6px;padding-left:.42em;
}
.auth-sub{
  font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--dim);text-align:center;margin-bottom:44px;padding-left:.28em;
}
.auth-sub em{color:var(--red);font-style:normal;}
.field{margin-bottom:18px;}
.field label{
  display:block;font-family:var(--mono);font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);margin-bottom:8px;
}
.field input{
  width:100%;padding:13px 14px;font-size:14px;
  background:var(--bg-soft);color:var(--ink);
  border:1px solid var(--line);border-radius:0;
  transition:border-color var(--dur) var(--ease);
}
.field input:focus{outline:none;border-color:var(--red);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  padding:13px 20px;border:1px solid var(--ink);color:var(--ink);
  transition:all var(--dur) var(--ease);user-select:none;
}
.btn:hover{border-color:var(--red);color:var(--red);}
.btn.red{background:var(--red);border-color:var(--red);color:#fff;}
.btn.red:hover{background:transparent;color:var(--red);}
.btn.full{width:100%;}
.btn:disabled{opacity:.45;pointer-events:none;}
.auth-error{
  font-family:var(--mono);font-size:11px;color:var(--red);
  margin-top:14px;text-align:center;min-height:16px;letter-spacing:.04em;
}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:none;height:100dvh;flex-direction:column;}
#app.active{display:flex;}

header{
  display:flex;align-items:center;gap:14px;
  padding:0 24px;height:58px;flex-shrink:0;
  border-bottom:1px solid var(--line);
}
.hdr-mark{width:18px;height:18px;flex-shrink:0;}
.hdr-brand{
  font-family:var(--display);font-weight:700;font-size:14px;
  letter-spacing:.34em;text-transform:uppercase;white-space:nowrap;
}
.hdr-spacer{flex:1;}
.hdr-user{
  font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--dim);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;
}
.icon-btn{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  color:var(--dim);transition:color var(--dur) var(--ease);flex-shrink:0;
}
.icon-btn:hover{color:var(--red);}
.icon-btn svg{width:17px;height:17px;}

.layout{flex:1;display:flex;min-height:0;}

/* ---------- pastas ---------- */
aside{
  width:230px;flex-shrink:0;border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:26px 0 16px;min-height:0;
}
.aside-head{padding:0 22px;margin-bottom:14px;}
.folder-list{flex:1;overflow-y:auto;padding:0 12px;}
.folder{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:9px 10px;font-size:13px;font-weight:500;color:var(--dim);
  border-left:2px solid transparent;
  transition:color var(--dur) var(--ease),border-color var(--dur) var(--ease);
}
.folder:hover{color:var(--ink);}
.folder.active{color:var(--ink);border-left-color:var(--red);}
.folder .dot{width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background var(--dur) var(--ease);}
.folder.active .dot{background:var(--red);}
.folder .count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint);}
.aside-foot{padding:14px 22px 0;}
.link-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--dim);display:inline-flex;align-items:center;gap:8px;
  transition:color var(--dur) var(--ease);
}
.link-btn:hover{color:var(--red);}
.link-btn svg{width:13px;height:13px;}

/* ---------- lista de arquivos ---------- */
main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
.main-head{
  display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
  padding:26px 30px 18px;
}
.main-title{font-family:var(--display);font-weight:600;font-size:24px;letter-spacing:-.01em;}
.main-meta{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:4px;}
.main-actions{display:flex;gap:10px;flex-shrink:0;}

.file-scroll{flex:1;overflow-y:auto;padding:0 30px 40px;}
.file-row{
  display:flex;align-items:center;gap:16px;
  padding:15px 4px;border-bottom:1px solid var(--line);
  cursor:pointer;position:relative;
}
.file-row::before{
  content:'';position:absolute;left:0;bottom:-1px;height:1px;width:0;
  background:var(--red);transition:width .28s var(--ease);
}
.file-row:hover::before{width:100%;}
.file-name{
  flex:1;min-width:0;font-size:14px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:transform var(--dur) var(--ease);
}
.file-row:hover .file-name{transform:translateX(4px);}
.file-meta{font-family:var(--mono);font-size:10.5px;color:var(--dim);white-space:nowrap;}
.file-actions{display:flex;gap:2px;opacity:0;transition:opacity var(--dur) var(--ease);}
.file-row:hover .file-actions,.file-row:focus-within .file-actions{opacity:1;}
@media (hover:none){.file-actions{opacity:1;}}
.file-actions .icon-btn{width:30px;height:30px;}
.file-actions .icon-btn svg{width:15px;height:15px;}

/* ---------- vazio ---------- */
.empty{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;color:var(--dim);padding-bottom:40px;
}
.empty .ring{width:110px;height:110px;opacity:.85;}
.empty p{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;}

/* ============================================================
   MODAIS
   ============================================================ */
.backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:60;
  display:none;align-items:center;justify-content:center;padding:20px;
}
html[data-theme="dark"] .backdrop{background:rgba(0,0,0,.6);}
.backdrop.open{display:flex;}
.modal{
  background:var(--bg);border:1px solid var(--line);
  width:100%;max-width:400px;padding:28px;
  animation:pop .18s var(--ease);
}
@keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.modal .trace-label{margin-bottom:22px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}
.modal select{
  width:100%;padding:12px 14px;font-size:14px;font-family:inherit;
  background:var(--bg-soft);color:var(--ink);border:1px solid var(--line);
}
.modal select:focus{outline:none;border-color:var(--red);}
.modal .warn{font-size:13px;color:var(--dim);line-height:1.6;}
.modal .warn strong{color:var(--ink);font-weight:600;word-break:break-all;}

/* dropzone */
.drop{
  border:1px dashed var(--faint);padding:36px 20px;text-align:center;
  cursor:pointer;transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease);
}
.drop:hover,.drop.over{border-color:var(--red);background:var(--red-soft);}
.drop p{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);}
.drop p em{color:var(--red);font-style:normal;}
.up-list{margin-top:16px;display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;}
.up-item{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--dim);}
.up-item .st{margin-left:auto;color:var(--faint);}
.up-item.ok .st{color:var(--red);}

/* ============================================================
   LEITOR
   ============================================================ */
#viewer{
  position:fixed;inset:0;z-index:70;background:var(--bg);
  display:none;flex-direction:column;
}
#viewer.open{display:flex;}
.v-bar{
  display:flex;align-items:center;gap:6px;
  padding:0 16px;height:52px;flex-shrink:0;
  border-bottom:1px solid var(--line);
}
.v-title{
  flex:1;min-width:0;font-size:13px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px;
}
.v-page-input{
  width:44px;padding:5px;text-align:center;font-family:var(--mono);font-size:12px;
  background:var(--bg-soft);color:var(--ink);border:1px solid var(--line);
}
.v-page-input:focus{outline:none;border-color:var(--red);}
.v-count{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;}
.v-sep{width:1px;height:18px;background:var(--line);margin:0 4px;}
.v-zoom{font-family:var(--mono);font-size:11px;color:var(--dim);width:40px;text-align:center;}
.v-body{
  flex:1;overflow:auto;background:var(--canvas-bg);
  display:flex;justify-content:center;align-items:flex-start;padding:22px;
}
#pdf-canvas{box-shadow:0 10px 40px rgba(0,0,0,.14);background:#fff;max-width:100%;height:auto;}

/* ============================================================
   TOAST + LOADING
   ============================================================ */
#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{
  background:var(--ink);color:var(--bg);
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;
  padding:11px 18px;animation:pop .18s var(--ease);white-space:nowrap;
}
.toast.err{background:var(--red);color:#fff;}
#loading{
  position:fixed;inset:0;z-index:95;background:color-mix(in srgb,var(--bg) 78%,transparent);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
#loading.open{display:flex;}
#loading p{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);}

/* ============================================================
   RESPONSIVO
   ============================================================ */
@media (max-width:760px){
  header{padding:0 16px;}
  .hdr-user{display:none;}
  .layout{flex-direction:column;}
  aside{
    width:100%;border-right:none;border-bottom:1px solid var(--line);
    padding:14px 0 0;flex-direction:column;
  }
  .aside-head{margin-bottom:10px;padding:0 16px;}
  .folder-list{
    display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;
    padding:0 12px 12px;gap:4px;
  }
  .folder{
    width:auto;flex-shrink:0;border-left:none;border-bottom:2px solid transparent;
    padding:7px 12px;white-space:nowrap;
  }
  .folder.active{border-bottom-color:var(--red);}
  .folder .count{margin-left:6px;}
  .aside-foot{position:absolute;top:14px;right:16px;padding:0;}
  aside{position:relative;}
  .main-head{padding:20px 16px 12px;flex-direction:column;align-items:flex-start;}
  .main-actions{width:100%;}
  .main-actions .btn{flex:1;}
  .file-scroll{padding:0 16px 30px;}
  .file-meta.date{display:none;}
  .v-body{padding:10px;}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-ring ring"></div>
    <div class="auth-brand">Anon·PDF</div>
    <div class="auth-sub">Biblioteca <em>pessoal</em></div>
    <form id="login-form">
      <div class="field">
        <label for="login-email">E-mail</label>
        <input id="login-email" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="login-pass">Senha</label>
        <input id="login-pass" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn red full" id="login-btn" type="submit">Entrar</button>
      <div class="auth-error" id="auth-error"></div>
    </form>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header>
    <svg class="hdr-mark" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="var(--red)" stroke-width="2.2"/></svg>
    <div class="hdr-brand">Anon·PDF</div>
    <div class="hdr-spacer"></div>
    <div class="hdr-user" id="hdr-user"></div>
    <button class="icon-btn" id="theme-btn" title="Alternar tema" aria-label="Alternar tema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
    </button>
    <button class="icon-btn" id="logout-btn" title="Sair" aria-label="Sair">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
    </button>
  </header>

  <div class="layout">
    <aside>
      <div class="aside-head"><div class="trace-label">Pastas</div></div>
      <div class="folder-list" id="folder-list"></div>
      <div class="aside-foot">
        <button class="link-btn" id="new-folder-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Nova pasta
        </button>
      </div>
    </aside>

    <main>
      <div class="main-head">
        <div>
          <div class="main-title" id="main-title">—</div>
          <div class="main-meta" id="main-meta"></div>
        </div>
        <div class="main-actions">
          <button class="btn red" id="upload-btn">Enviar PDF</button>
        </div>
      </div>
      <div class="file-scroll" id="file-scroll"></div>
    </main>
  </div>
</div>

<!-- ============ MODAL: UPLOAD ============ -->
<div class="backdrop" id="m-upload">
  <div class="modal">
    <div class="trace-label">Enviar</div>
    <div class="drop" id="drop">
      <p>Arraste PDFs aqui ou <em>toque para escolher</em></p>
      <input type="file" id="file-input" accept="application/pdf" multiple hidden>
    </div>
    <div class="up-list" id="up-list"></div>
    <div class="modal-actions">
      <button class="btn" data-close="m-upload">Fechar</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: NOVA PASTA ============ -->
<div class="backdrop" id="m-folder">
  <div class="modal">
    <div class="trace-label">Nova pasta</div>
    <div class="field">
      <label for="folder-name">Nome</label>
      <input id="folder-name" type="text" maxlength="40" placeholder="ex.: estudos">
    </div>
    <div class="modal-actions">
      <button class="btn" data-close="m-folder">Cancelar</button>
      <button class="btn red" id="folder-create-btn">Criar</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: RENOMEAR ============ -->
<div class="backdrop" id="m-rename">
  <div class="modal">
    <div class="trace-label">Renomear</div>
    <div class="field">
      <label for="rename-input">Novo nome</label>
      <input id="rename-input" type="text" maxlength="120">
    </div>
    <div class="modal-actions">
      <button class="btn" data-close="m-rename">Cancelar</button>
      <button class="btn red" id="rename-ok-btn">Salvar</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: MOVER ============ -->
<div class="backdrop" id="m-move">
  <div class="modal">
    <div class="trace-label">Mover para</div>
    <select id="move-select"></select>
    <div class="modal-actions">
      <button class="btn" data-close="m-move">Cancelar</button>
      <button class="btn red" id="move-ok-btn">Mover</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: EXCLUIR ============ -->
<div class="backdrop" id="m-delete">
  <div class="modal">
    <div class="trace-label">Excluir</div>
    <p class="warn">Excluir <strong id="delete-name"></strong>? Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn" data-close="m-delete">Cancelar</button>
      <button class="btn red" id="delete-ok-btn">Excluir</button>
    </div>
  </div>
</div>

<!-- ============ LEITOR ============ -->
<div id="viewer">
  <div class="v-bar">
    <button class="icon-btn" id="v-close" aria-label="Fechar leitor">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="v-title" id="v-title"></div>
    <button class="icon-btn" id="v-prev" aria-label="Página anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <input class="v-page-input" id="v-page-input" value="1" inputmode="numeric">
    <span class="v-count">/ <span id="v-count">1</span></span>
    <button class="icon-btn" id="v-next" aria-label="Próxima página">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div class="v-sep"></div>
    <button class="icon-btn" id="v-zoom-out" aria-label="Diminuir zoom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M8 11h6"/></svg>
    </button>
    <span class="v-zoom" id="v-zoom">100%</span>
    <button class="icon-btn" id="v-zoom-in" aria-label="Aumentar zoom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M11 8v6M8 11h6"/></svg>
    </button>
    <div class="v-sep"></div>
    <button class="icon-btn" id="v-download" aria-label="Baixar PDF">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M12 15l-4-4M12 15l4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
    </button>
  </div>
  <div class="v-body" id="v-body">
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<div id="toasts"></div>
<div id="loading"><div class="spinner"></div><p id="loading-text">Carregando</p></div>

<script>
'use strict';
window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<script>
'use strict';
/* ============================================================
   CONFIG — preencha com os dados do SEU projeto Supabase.
   A chave "anon" é pública por natureza: a segurança vem das
   políticas RLS do bucket (ver README).
   ============================================================ */
const SUPABASE_URL = 'https://SEU-PROJETO.supabase.co';
const SUPABASE_ANON_KEY = 'SUA-CHAVE-ANON-PUBLICA';
const BUCKET = 'pdfs';
const PLACEHOLDER = '.keep';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============================================================
   ESTADO
   ============================================================ */
const S = {
  user: null,
  folders: [],          // [{name, count}]
  files: [],            // arquivos da pasta atual [{name, size, updated_at}]
  folder: null,         // pasta atual
  target: null,         // arquivo alvo de renomear/mover/excluir
  viewer: { pdfDoc:null, pageNum:1, scale:1, rotation:0, path:null, blob:null, name:null },
};

const $ = (id) => document.getElementById(id);

/* ============================================================
   HELPERS
   ============================================================ */
function toast(msg, err=false){
  const t = document.createElement('div');
  t.className = 'toast' + (err ? ' err' : '');
  t.textContent = msg;
  $('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}
function loading(on, text='Carregando'){
  $('loading-text').textContent = text;
  $('loading').classList.toggle('open', on);
}
function openModal(id){ $(id).classList.add('open'); }
function closeModal(id){ $(id).classList.remove('open'); }
document.querySelectorAll('[data-close]').forEach(b=>{
  b.addEventListener('click', ()=>closeModal(b.dataset.close));
});
document.querySelectorAll('.backdrop').forEach(bd=>{
  bd.addEventListener('click', (e)=>{ if(e.target===bd) bd.classList.remove('open'); });
});

function fmtSize(bytes){
  if(!bytes && bytes!==0) return '';
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1048576) return (bytes/1024).toFixed(0) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function sanitize(name){
  return name.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9._ -]/g,'').replace(/\s+/g,' ').trim();
}
function pathOf(folder, file){ return `${S.user.id}/${folder}/${file}`; }
function escHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================================================
   TEMA (localStorage)
   ============================================================ */
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
}
applyTheme(localStorage.getItem('theme') || 'light');
$('theme-btn').addEventListener('click', ()=>{
  applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
});

/* ============================================================
   AUTH
   ============================================================ */
$('login-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  $('auth-error').textContent = '';
  $('login-btn').disabled = true;
  const { error } = await sb.auth.signInWithPassword({
    email: $('login-email').value.trim(),
    password: $('login-pass').value,
  });
  $('login-btn').disabled = false;
  if(error){ $('auth-error').textContent = 'E-mail ou senha inválidos'; }
});

$('logout-btn').addEventListener('click', async ()=>{
  await sb.auth.signOut();
});

sb.auth.onAuthStateChange((_event, session)=>{
  if(session?.user){
    S.user = session.user;
    $('hdr-user').textContent = session.user.email;
    $('auth-screen').classList.add('hidden');
    $('app').classList.add('active');
    boot();
  } else {
    S.user = null;
    $('app').classList.remove('active');
    $('auth-screen').classList.remove('hidden');
  }
});

/* ============================================================
   PASTAS
   ============================================================ */
async function loadFolders(){
  const { data, error } = await sb.storage.from(BUCKET).list(S.user.id, { limit: 200 });
  if(error){ toast('Erro ao listar pastas', true); console.error(error); return; }
  // Entradas sem "id" são pastas (prefixos)
  S.folders = (data || []).filter(e => e.id === null).map(e => ({ name: e.name, count: null }));
  // conta arquivos em paralelo
  await Promise.all(S.folders.map(async f => {
    const { data: fs } = await sb.storage.from(BUCKET).list(`${S.user.id}/${f.name}`, { limit: 500 });
    f.count = (fs || []).filter(x => x.name !== PLACEHOLDER).length;
  }));
  renderFolders();
}

function renderFolders(){
  const el = $('folder-list');
  if(!S.folders.length){
    el.innerHTML = '<div style="padding:8px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase;">Nenhuma pasta</div>';
    return;
  }
  el.innerHTML = S.folders.map(f => `
    <button class="folder ${f.name===S.folder?'active':''}" data-folder="${escHtml(f.name)}">
      <span class="dot"></span>
      <span>${escHtml(f.name)}</span>
      <span class="count">${f.count ?? ''}</span>
    </button>`).join('');
  el.querySelectorAll('.folder').forEach(b=>{
    b.addEventListener('click', ()=>selectFolder(b.dataset.folder));
  });
}

async function selectFolder(name){
  S.folder = name;
  localStorage.setItem('lastFolder', name);
  renderFolders();
  await loadFiles();
}

$('new-folder-btn').addEventListener('click', ()=>{
  $('folder-name').value = '';
  openModal('m-folder');
  $('folder-name').focus();
});
$('folder-create-btn').addEventListener('click', createFolder);
$('folder-name').addEventListener('keydown', e=>{ if(e.key==='Enter') createFolder(); });

async function createFolder(){
  const name = sanitize($('folder-name').value).toLowerCase().replace(/\s/g,'-');
  if(!name){ toast('Nome inválido', true); return; }
  if(S.folders.some(f=>f.name===name)){ toast('Pasta já existe', true); return; }
  loading(true, 'Criando pasta');
  // Storage não tem pastas reais: cria um placeholder vazio
  const { error } = await sb.storage.from(BUCKET)
    .upload(pathOf(name, PLACEHOLDER), new Blob(['']), { upsert:true });
  loading(false);
  if(error){ toast('Erro ao criar pasta', true); console.error(error); return; }
  closeModal('m-folder');
  await loadFolders();
  await selectFolder(name);
  toast('Pasta criada');
}

/* ============================================================
   ARQUIVOS
   ============================================================ */
async function loadFiles(){
  if(!S.folder){ S.files = []; renderFiles(); return; }
  const { data, error } = await sb.storage.from(BUCKET)
    .list(`${S.user.id}/${S.folder}`, { limit: 500, sortBy: { column:'name', order:'asc' } });
  if(error){ toast('Erro ao listar arquivos', true); console.error(error); return; }
  S.files = (data || []).filter(f => f.name !== PLACEHOLDER && f.id !== null);
  renderFiles();
}

function renderFiles(){
  $('main-title').textContent = S.folder || 'Biblioteca';
  $('main-meta').textContent = S.folder
    ? `${S.files.length} ${S.files.length===1?'arquivo':'arquivos'}`
    : 'Selecione ou crie uma pasta';
  const el = $('file-scroll');
  if(!S.folder || !S.files.length){
    el.innerHTML = `
      <div class="empty">
        <div class="ring"></div>
        <p>${S.folder ? 'Pasta vazia' : 'Crie uma pasta para começar'}</p>
      </div>`;
    return;
  }
  el.innerHTML = S.files.map(f => `
    <div class="file-row" data-name="${escHtml(f.name)}" tabindex="0" role="button">
      <div class="file-name">${escHtml(f.name)}</div>
      <div class="file-meta">${fmtSize(f.metadata?.size)}</div>
      <div class="file-meta date">${fmtDate(f.updated_at || f.created_at)}</div>
      <div class="file-actions">
        <button class="icon-btn" data-act="rename" title="Renomear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.8 2.8 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>
        <button class="icon-btn" data-act="move" title="Mover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2v11z"/><path d="M12 11v6M9 14l3 3 3-3"/></svg></button>
        <button class="icon-btn" data-act="delete" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg></button>
      </div>
    </div>`).join('');

  el.querySelectorAll('.file-row').forEach(row=>{
    const name = row.dataset.name;
    row.addEventListener('click', (e)=>{
      const act = e.target.closest('[data-act]');
      if(act){
        e.stopPropagation();
        S.target = name;
        if(act.dataset.act==='rename'){ $('rename-input').value = name.replace(/\.pdf$/i,''); openModal('m-rename'); $('rename-input').focus(); }
        if(act.dataset.act==='move'){ openMove(); }
        if(act.dataset.act==='delete'){ $('delete-name').textContent = name; openModal('m-delete'); }
        return;
      }
      openViewer(name);
    });
    row.addEventListener('keydown', (e)=>{ if(e.key==='Enter') openViewer(name); });
  });
}

/* ---------- upload ---------- */
$('upload-btn').addEventListener('click', ()=>{
  if(!S.folder){ toast('Crie/selecione uma pasta antes', true); return; }
  $('up-list').innerHTML = '';
  openModal('m-upload');
});
$('drop').addEventListener('click', ()=>$('file-input').click());
$('drop').addEventListener('dragover', e=>{ e.preventDefault(); $('drop').classList.add('over'); });
$('drop').addEventListener('dragleave', ()=>$('drop').classList.remove('over'));
$('drop').addEventListener('drop', e=>{
  e.preventDefault(); $('drop').classList.remove('over');
  uploadFiles([...e.dataTransfer.files]);
});
$('file-input').addEventListener('change', e=>{
  uploadFiles([...e.target.files]);
  e.target.value = '';
});

async function uploadFiles(files){
  const pdfs = files.filter(f => f.type === 'application/pdf' || /\.pdf$/i.test(f.name));
  if(!pdfs.length){ toast('Apenas arquivos PDF', true); return; }
  const list = $('up-list');
  for(const file of pdfs){
    let name = sanitize(file.name);
    if(!/\.pdf$/i.test(name)) name += '.pdf';
    const item = document.createElement('div');
    item.className = 'up-item';
    item.innerHTML = `<span>${escHtml(name)}</span><span class="st">enviando…</span>`;
    list.appendChild(item);
    const { error } = await sb.storage.from(BUCKET)
      .upload(pathOf(S.folder, name), file, { contentType:'application/pdf', upsert:false });
    if(error){
      item.querySelector('.st').textContent = error.message?.includes('exists') ? 'já existe' : 'erro';
      item.querySelector('.st').style.color = 'var(--red)';
    } else {
      item.classList.add('ok');
      item.querySelector('.st').textContent = 'ok';
    }
  }
  await loadFiles();
  await loadFolders();
}

/* ---------- renomear ---------- */
$('rename-ok-btn').addEventListener('click', renameFile);
$('rename-input').addEventListener('keydown', e=>{ if(e.key==='Enter') renameFile(); });
async function renameFile(){
  let name = sanitize($('rename-input').value);
  if(!name){ toast('Nome inválido', true); return; }
  if(!/\.pdf$/i.test(name)) name += '.pdf';
  if(name === S.target){ closeModal('m-rename'); return; }
  loading(true, 'Renomeando');
  const { error } = await sb.storage.from(BUCKET)
    .move(pathOf(S.folder, S.target), pathOf(S.folder, name));
  loading(false);
  if(error){ toast('Erro ao renomear', true); console.error(error); return; }
  // migra última página lida
  const lp = localStorage.getItem('lastpage:' + pathOf(S.folder, S.target));
  if(lp){ localStorage.setItem('lastpage:' + pathOf(S.folder, name), lp); localStorage.removeItem('lastpage:' + pathOf(S.folder, S.target)); }
  closeModal('m-rename');
  await loadFiles();
  toast('Renomeado');
}

/* ---------- mover ---------- */
function openMove(){
  const others = S.folders.filter(f => f.name !== S.folder);
  if(!others.length){ toast('Crie outra pasta antes', true); return; }
  $('move-select').innerHTML = others.map(f=>`<option value="${escHtml(f.name)}">${escHtml(f.name)}</option>`).join('');
  openModal('m-move');
}
$('move-ok-btn').addEventListener('click', async ()=>{
  const dest = $('move-select').value;
  loading(true, 'Movendo');
  const { error } = await sb.storage.from(BUCKET)
    .move(pathOf(S.folder, S.target), pathOf(dest, S.target));
  loading(false);
  if(error){ toast('Erro ao mover', true); console.error(error); return; }
  const lp = localStorage.getItem('lastpage:' + pathOf(S.folder, S.target));
  if(lp){ localStorage.setItem('lastpage:' + pathOf(dest, S.target), lp); localStorage.removeItem('lastpage:' + pathOf(S.folder, S.target)); }
  closeModal('m-move');
  await loadFiles();
  await loadFolders();
  toast('Movido para ' + dest);
});

/* ---------- excluir ---------- */
$('delete-ok-btn').addEventListener('click', async ()=>{
  loading(true, 'Excluindo');
  const path = pathOf(S.folder, S.target);
  const { error } = await sb.storage.from(BUCKET).remove([path]);
  loading(false);
  if(error){ toast('Erro ao excluir', true); console.error(error); return; }
  localStorage.removeItem('lastpage:' + path);
  closeModal('m-delete');
  await loadFiles();
  await loadFolders();
  toast('Excluído');
});

/* ============================================================
   LEITOR — PDF.js
   ============================================================ */
async function openViewer(name){
  const path = pathOf(S.folder, name);
  loading(true, 'Baixando PDF');
  const { data: blob, error } = await sb.storage.from(BUCKET).download(path);
  if(error){ loading(false); toast('Erro ao baixar o PDF', true); console.error(error); return; }
  try{
    const bytes = new Uint8Array(await blob.arrayBuffer());
    const pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
    const saved = parseInt(localStorage.getItem('lastpage:' + path)) || 1;
    S.viewer = {
      pdfDoc,
      pageNum: Math.min(saved, pdfDoc.numPages),
      scale: window.innerWidth < 760 ? 0 : 1.2,  // 0 = ajustar à largura
      rotation: 0, path, blob, name,
    };
    $('v-title').textContent = name;
    $('v-count').textContent = pdfDoc.numPages;
    $('v-page-input').value = S.viewer.pageNum;
    $('viewer').classList.add('open');
    await renderPage();
  } catch(err){
    console.error(err);
    toast('Erro ao abrir o PDF', true);
  }
  loading(false);
}

async function renderPage(){
  const v = S.viewer;
  if(!v.pdfDoc) return;
  const page = await v.pdfDoc.getPage(v.pageNum);
  let scale = v.scale;
  if(scale === 0){ // ajustar à largura da tela
    const base = page.getViewport({ scale: 1 });
    scale = ($('v-body').clientWidth - 24) / base.width;
    v.scale = scale;
  }
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const viewport = page.getViewport({ scale: scale * dpr, rotation: v.rotation });
  const canvas = $('pdf-canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = (viewport.width / dpr) + 'px';
  canvas.style.height = (viewport.height / dpr) + 'px';
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  $('v-zoom').textContent = Math.round(scale * 83) + '%';
  localStorage.setItem('lastpage:' + v.path, v.pageNum);
}

function gotoPage(n){
  const v = S.viewer;
  n = Math.max(1, Math.min(v.pdfDoc.numPages, n));
  v.pageNum = n;
  $('v-page-input').value = n;
  renderPage();
}
$('v-prev').addEventListener('click', ()=>gotoPage(S.viewer.pageNum - 1));
$('v-next').addEventListener('click', ()=>gotoPage(S.viewer.pageNum + 1));
$('v-page-input').addEventListener('change', e=>gotoPage(parseInt(e.target.value) || 1));
$('v-zoom-in').addEventListener('click', ()=>{ S.viewer.scale = Math.min(3, S.viewer.scale + 0.2); renderPage(); });
$('v-zoom-out').addEventListener('click', ()=>{ S.viewer.scale = Math.max(0.4, S.viewer.scale - 0.2); renderPage(); });
$('v-download').addEventListener('click', ()=>{
  const v = S.viewer;
  const url = URL.createObjectURL(v.blob);
  const a = document.createElement('a');
  a.href = url; a.download = v.name; a.click();
  URL.revokeObjectURL(url);
});
$('v-close').addEventListener('click', ()=>{
  $('viewer').classList.remove('open');
  S.viewer.pdfDoc?.destroy?.();
  S.viewer = { pdfDoc:null, pageNum:1, scale:1, rotation:0, path:null, blob:null, name:null };
});
document.addEventListener('keydown', e=>{
  if(!$('viewer').classList.contains('open')) return;
  if(e.target.tagName === 'INPUT') return;
  if(e.key === 'ArrowLeft') gotoPage(S.viewer.pageNum - 1);
  if(e.key === 'ArrowRight') gotoPage(S.viewer.pageNum + 1);
  if(e.key === 'Escape') $('v-close').click();
});

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  loading(true, 'Sincronizando');
  await loadFolders();
  const last = localStorage.getItem('lastFolder');
  const target = S.folders.find(f=>f.name===last)?.name || S.folders[0]?.name || null;
  if(target) await selectFolder(target);
  else renderFiles();
  loading(false);
}
</script>
</body>
</html>
